<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Crafteo Infinito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>✨ Crafteo Infinito</h1>
      <div id="stats">0 / 0</div>
      <div id="header-actions">
        <button id="btn-clear" title="Limpiar mesa de trabajo">🧹 Limpiar</button>
        <button id="btn-reset" title="Reiniciar juego">🔄 Reiniciar</button>
      </div>
    </header>

    <main id="main">
      <aside id="sidebar">
        <div id="sidebar-header">
          <input type="text" id="search" placeholder="🔍 Buscar elemento..." autocomplete="off">
        </div>
        <div id="elements-list"></div>
      </aside>

      <div id="canvas">
        <div id="canvas-hint">
          <p>Arrastra elementos aquí</p>
          <p>y combínalos entre sí</p>
        </div>
      </div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <div id="no-result-toast" class="toast toast-error"></div>

  <div id="reset-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2>¿Reiniciar el juego?</h2>
      <p>Se perderán todos los elementos descubiertos.</p>
      <div class="modal-actions">
        <button id="modal-cancel" class="btn-secondary">Cancelar</button>
        <button id="modal-confirm" class="btn-danger">Reiniciar</button>
      </div>
    </div>
  </div>

  <script src="combinations.js"></script>
  <script src="game.js"></script>
</body>
</html>
