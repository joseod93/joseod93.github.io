<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Advisor - Camera</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>♠ Blackjack Advisor ♥</h1>
            <div class="header-controls">
                <label>Barajas:
                    <select id="deckCount">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="6" selected>6</option>
                        <option value="8">8</option>
                    </select>
                </label>
                <button id="btnReset" class="btn btn-danger">Nueva Zapato</button>
                <button id="btnUndo" class="btn btn-secondary" disabled>↩ Deshacer</button>
            </div>
        </header>

        <!-- Main advice banner -->
        <section id="adviceSection" class="advice-section">
            <div id="adviceBox" class="advice-box waiting">
                <span class="advice-action" id="adviceAction">—</span>
                <span class="advice-reason" id="adviceReason">Esperando cartas...</span>
            </div>
        </section>

        <!-- Hands display -->
        <section class="hands-section">
            <div class="hand-panel dealer-panel">
                <h3>🏦 BANCA <span id="dealerTotal" class="hand-total"></span></h3>
                <div class="hand-cards" id="dealerCards"></div>
            </div>
            <div class="hand-panel player-panel">
                <h3>🃏 TÚ <span id="playerTotal" class="hand-total"></span></h3>
                <div class="hand-cards" id="playerCards"></div>
            </div>
            <div class="hand-panel others-panel">
                <h3>👥 OTROS <span id="othersCount" class="hand-total"></span></h3>
                <div class="hand-cards" id="othersCards"></div>
            </div>
        </section>

        <!-- Camera section -->
        <section class="camera-section">
            <div class="camera-header">
                <h2>📷 Cámara</h2>
                <div class="camera-controls">
                    <button id="btnCamera" class="btn btn-primary">Iniciar Cámara</button>
                    <button id="btnStopCamera" class="btn btn-secondary" style="display:none">Parar</button>
                    <label class="switch-label">
                        <input type="checkbox" id="autoDetect" checked>
                        Auto-detectar
                    </label>
                </div>
            </div>
            <div class="camera-container" id="cameraContainer" style="display:none">
                <video id="video" autoplay playsinline></video>
                <canvas id="overlay"></canvas>
                <div class="camera-zones">
                    <div class="zone zone-dealer" data-zone="dealer">BANCA</div>
                    <div class="zone zone-player" data-zone="player">TÚ</div>
                    <div class="zone zone-others" data-zone="others">OTROS</div>
                </div>
            </div>
            <div class="camera-settings" id="cameraSettings" style="display:none">
                <label>Sensibilidad: <input type="range" id="sensitivity" min="80" max="220" value="128"> <span id="sensValue">128</span></label>
                <label>FPS detección: <input type="range" id="detectionFps" min="1" max="15" value="5"> <span id="fpsValue">5</span></label>
            </div>
        </section>

        <!-- Manual card input (fallback) -->
        <section class="manual-section">
            <div class="manual-header">
                <h2>Entrada manual</h2>
                <div class="zone-selector">
                    <span>Asignar a:</span>
                    <button class="zone-btn active" data-target="player">Tú</button>
                    <button class="zone-btn" data-target="dealer">Banca</button>
                    <button class="zone-btn" data-target="others">Otros</button>
                </div>
            </div>
            <div class="cards-grid" id="cardsGrid"></div>
        </section>

        <!-- Stats section -->
        <section class="stats-section">
            <div class="count-boxes">
                <div class="count-box">
                    <span class="count-label">Running</span>
                    <span id="runningCount" class="count-value">0</span>
                </div>
                <div class="count-box">
                    <span class="count-label">True Count</span>
                    <span id="trueCount" class="count-value">0.0</span>
                </div>
                <div class="count-box">
                    <span class="count-label">Ventaja</span>
                    <span id="advantage" class="count-value">-0.5%</span>
                </div>
                <div class="count-box">
                    <span class="count-label">Restantes</span>
                    <span id="remaining" class="count-value">312</span>
                </div>
            </div>
            <div class="prob-row">
                <span>Bust si pides:</span>
                <span id="bustProb" class="prob-value">—</span>
                <span>Bust banca:</span>
                <span id="dealerBust" class="prob-value">—</span>
            </div>
        </section>

        <!-- History -->
        <section class="history-section">
            <h2>Historial</h2>
            <div id="history" class="history"></div>
        </section>

        <!-- New hand button -->
        <section class="new-hand-section">
            <button id="btnNewHand" class="btn btn-primary btn-large">🔄 Nueva Mano</button>
        </section>
    </div>

    <script src="detector.js"></script>
    <script src="strategy.js"></script>
    <script src="app.js"></script>
</body>
</html>
