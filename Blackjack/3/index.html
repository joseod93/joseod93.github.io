<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>BJ Advisor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <!-- SETUP PANEL -->
        <div id="setupPanel" class="setup-panel">
            <h1 class="app-title">&#9824; BJ Advisor &#9829;</h1>
            <div class="setup-config">
                <label class="config-label">
                    Barajas:
                    <select id="deckCount">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="6" selected>6</option>
                        <option value="8">8</option>
                    </select>
                </label>
                <button id="btnStartCamera" class="btn btn-primary btn-large">&#128247; Iniciar camara</button>
            </div>
            <p id="setupHint" class="setup-hint">Inicia la camara para configurar posiciones</p>
        </div>

        <!-- VIDEO SECTION -->
        <section id="videoSection" class="video-section" style="display:none">
            <div id="videoContainer" class="video-container">
                <video id="video" autoplay playsinline muted></video>
                <canvas id="overlay"></canvas>
                <div id="dealerMarker" class="zone-marker dealer-marker" style="display:none">&#127970;</div>
                <div id="playerMarker" class="zone-marker player-marker" style="display:none">&#127183;</div>
            </div>
            <div id="setupInstructions" class="setup-instructions" style="display:none">
                <p id="setupText" class="setup-text"></p>
                <button id="btnReady" class="btn btn-primary btn-large" style="display:none">&#9989; Empezar a jugar!</button>
            </div>
        </section>

        <!-- PLAYING UI -->
        <div id="playingUI" style="display:none">
            <!-- Advice banner -->
            <section class="advice-section">
                <div id="adviceBox" class="advice-box waiting">
                    <span id="adviceAction" class="advice-action">&mdash;</span>
                    <span id="adviceReason" class="advice-reason">Esperando cartas...</span>
                </div>
            </section>

            <!-- Hands display -->
            <section class="hands-section">
                <div class="hand-panel dealer-panel">
                    <h3>&#127970; BANCA <span id="dealerTotal" class="hand-total"></span></h3>
                    <div class="hand-cards" id="dealerCards"></div>
                </div>
                <div class="hand-panel player-panel">
                    <h3>&#127183; TU <span id="playerTotal" class="hand-total"></span></h3>
                    <div class="hand-cards" id="playerCards"></div>
                </div>
                <div class="hand-panel others-panel">
                    <h3>&#128101; OTROS <span id="othersCount" class="hand-total"></span></h3>
                    <div class="hand-cards" id="othersCards"></div>
                </div>
            </section>

            <!-- Stats -->
            <section class="stats-section">
                <div class="count-boxes">
                    <div class="count-box">
                        <span class="count-label">Running</span>
                        <span id="runningCount" class="count-value">0</span>
                    </div>
                    <div class="count-box">
                        <span class="count-label">True Count</span>
                        <span id="trueCount" class="count-value">0.0</span>
                    </div>
                    <div class="count-box">
                        <span class="count-label">Ventaja</span>
                        <span id="advantage" class="count-value">-0.5%</span>
                    </div>
                    <div class="count-box">
                        <span class="count-label">Restantes</span>
                        <span id="remaining" class="count-value">312</span>
                    </div>
                </div>
                <div class="prob-row">
                    <span>Bust si pides:</span>
                    <span id="bustProb" class="prob-value">&mdash;</span>
                    <span>Bust banca:</span>
                    <span id="dealerBust" class="prob-value">&mdash;</span>
                </div>
            </section>

            <!-- Actions -->
            <section class="actions-section">
                <button id="btnNewHand" class="btn btn-primary btn-large">&#128260; Nueva Mano</button>
                <div class="secondary-actions">
                    <button id="btnUndo" class="btn btn-secondary" disabled>&#8617; Deshacer</button>
                    <button id="btnReset" class="btn btn-danger">Nuevo Zapato</button>
                    <button id="btnReconfig" class="btn btn-secondary">&#9881; Posiciones</button>
                </div>
            </section>

            <!-- Manual input (collapsed) -->
            <details class="manual-details">
                <summary>&#9999; Entrada manual</summary>
                <div class="manual-content">
                    <div class="zone-selector">
                        <span>Asignar a:</span>
                        <button class="zone-btn active" data-target="player">Tu</button>
                        <button class="zone-btn" data-target="dealer">Banca</button>
                        <button class="zone-btn" data-target="others">Otros</button>
                    </div>
                    <div id="cardsGrid" class="cards-grid"></div>
                </div>
            </details>

            <!-- Camera settings (collapsed) -->
            <details class="settings-details">
                <summary>&#9881; Ajustes camara</summary>
                <div class="settings-content">
                    <label>Sensibilidad: <input type="range" id="sensitivity" min="80" max="220" value="128"> <span id="sensValue">128</span></label>
                    <label>FPS deteccion: <input type="range" id="detectionFps" min="1" max="15" value="5"> <span id="fpsValue">5</span></label>
                    <label class="switch-label">
                        <input type="checkbox" id="autoNewHand">
                        Auto nueva mano (experimental)
                    </label>
                </div>
            </details>

            <!-- History (collapsed) -->
            <details class="history-details">
                <summary>&#128203; Historial</summary>
                <div id="history" class="history"></div>
            </details>
        </div>
    </div>

    <script src="detector.js"></script>
    <script src="strategy.js"></script>
    <script src="app.js"></script>
</body>
</html>
