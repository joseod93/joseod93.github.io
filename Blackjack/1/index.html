<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackjack Card Counter</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <header>
            <h1>♠ Blackjack Counter ♥</h1>
            <div class="deck-config">
                <label>Barajas:
                    <select id="deckCount">
                        <option value="1">1</option>
                        <option value="2">2</option>
                        <option value="4">4</option>
                        <option value="6" selected>6</option>
                        <option value="8">8</option>
                    </select>
                </label>
                <button id="btnReset" class="btn btn-reset">Nueva partida</button>
            </div>
        </header>

        <section class="count-section">
            <div class="count-box running">
                <span class="count-label">Running Count</span>
                <span id="runningCount" class="count-value">0</span>
            </div>
            <div class="count-box true">
                <span class="count-label">True Count</span>
                <span id="trueCount" class="count-value">0.0</span>
            </div>
            <div class="count-box advantage">
                <span class="count-label">Ventaja jugador</span>
                <span id="playerAdvantage" class="count-value">-0.5%</span>
            </div>
            <div class="count-box remaining">
                <span class="count-label">Cartas restantes</span>
                <span id="cardsRemaining" class="count-value">312</span>
            </div>
        </section>

        <section class="cards-section">
            <h2>Selecciona cartas jugadas</h2>
            <div class="cards-grid" id="cardsGrid"></div>
        </section>

        <section class="stats-section">
            <h2>Probabilidades</h2>
            <div class="stats-grid" id="statsGrid"></div>
        </section>

        <section class="advice-section">
            <div id="adviceBox" class="advice-box neutral">
                <span id="adviceText">Empieza a contar cartas...</span>
            </div>
        </section>

        <section class="history-section">
            <h2>Historial</h2>
            <div id="history" class="history"></div>
            <button id="btnUndo" class="btn btn-undo" disabled>↩ Deshacer última</button>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
