<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WebKit Security Diagnostic</title>
<style>
body { font-family: monospace; background:#111; color:#0f0; padding:20px; }
h2 { color:#0ff; }
.pass { color:#0f0; }
.warn { color:#ff0; }
.fail { color:#f00; }
</style>
</head>
<body>

<h1>WebKit Security Diagnostic</h1>
<div id="log"></div>

<script>
function log(msg, cls="pass") {
    const div = document.createElement("div");
    div.className = cls;
    div.textContent = msg;
    document.getElementById("log").appendChild(div);
}

log("UserAgent: " + navigator.userAgent);
log("Platform: " + navigator.platform);
log("HardwareConcurrency: " + navigator.hardwareConcurrency);
log("Timezone: " + Intl.DateTimeFormat().resolvedOptions().timeZone);

log("---- JIT Heuristic Test ----", "warn");

// JIT heuristic timing
function jitTest(){
    function add(a,b){ return a+b; }
    let t0 = performance.now();
    for(let i=0;i<5e6;i++) add(i,i);
    let t1 = performance.now();
    return t1 - t0;
}

let jitTime = jitTest();
log("JIT timing: " + jitTime.toFixed(2) + " ms");

log("---- Prototype Integrity ----", "warn");
let originalPush = Array.prototype.push;
Array.prototype.push = function(...args){
    return originalPush.apply(this,args);
};

if (Array.prototype.push === originalPush)
    log("Prototype locked", "fail");
else
    log("Prototype mutable", "warn");

// Restore
Array.prototype.push = originalPush;

log("---- TypedArray Boundary Test ----", "warn");

try {
    let buf = new ArrayBuffer(1024);
    let view = new Uint8Array(buf);
    view[1023] = 1;
    view[1024] = 2; // Should fail silently or ignore
    log("TypedArray OOB write did not crash (expected safe behavior)");
} catch(e){
    log("TypedArray boundary exception: " + e, "fail");
}

log("---- Memory Pressure Test ----", "warn");

try {
    let arr = [];
    for(let i=0;i<100000;i++){
        arr.push(new Array(100).fill(i));
    }
    log("Memory pressure stable at 100k allocations");
} catch(e){
    log("Memory pressure exception: " + e, "fail");
}

log("---- Recursion Depth ----", "warn");

let depth = 0;
try {
    (function recurse(){
        depth++;
        recurse();
    })();
} catch(e){
    log("Max recursion depth: " + depth);
}

log("---- WebAssembly Test ----", "warn");

if (typeof WebAssembly === "object") {
    log("WebAssembly available", "warn");
    try {
        const wasmCode = new Uint8Array([
            0x00,0x61,0x73,0x6d,
            0x01,0x00,0x00,0x00
        ]);
        WebAssembly.compile(wasmCode);
        log("Minimal WASM module compiled");
    } catch(e){
        log("WASM compile error (expected if disabled)");
    }
} else {
    log("WebAssembly not available");
}

log("---- Eval / Dynamic Code ----", "warn");

try {
    let f = new Function("return 42;");
    log("Function constructor allowed");
} catch(e){
    log("Function constructor blocked", "fail");
}

log("---- Timer Resolution ----", "warn");

let t0 = performance.now();
setTimeout(()=>{
    let t1 = performance.now();
    log("Timer delta: " + (t1 - t0).toFixed(3) + " ms");
},10);

log("---- DOM Stress ----", "warn");

try {
    for(let i=0;i<5000;i++){
        let div = document.createElement("div");
        document.body.appendChild(div);
    }
    log("DOM stress 5000 nodes OK");
} catch(e){
    log("DOM stress failure: " + e, "fail");
}

log("---- End Diagnostic ----", "pass");

</script>

</body>
</html>
