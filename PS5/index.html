<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Advanced WebKit JS Diagnostic</title>
<style>
  body { font-family: monospace; background:#111; color:#eee; padding:20px; }
  h1 { color:#4CAF50; }
  h2 { color:#00BCD4; margin-top:30px; }
  .box { background:#1e1e1e; padding:15px; margin-top:10px; border-radius:8px; }
  button { padding:6px 10px; margin-top:5px; }
  pre { max-height:300px; overflow:auto; background:#000; padding:10px; }
</style>
</head>
<body>

<h1>Advanced WebKit JS Diagnostic</h1>

<div class="box">
<h2>1️⃣ Listar propiedades globales</h2>
<button onclick="listGlobals()">Mostrar propiedades</button>
<p>Total: <span id="globalCount"></span></p>
<pre id="globalList"></pre>
</div>

<div class="box">
<h2>2️⃣ Detección indirecta de JIT</h2>
<button onclick="jitTest()">Ejecutar test rendimiento</button>
<p id="jitResult"></p>
</div>

<div class="box">
<h2>3️⃣ Stress test arrays</h2>
<button onclick="arrayTest()">Test array grande</button>
<p id="arrayResult"></p>
</div>

<div class="box">
<h2>4️⃣ DOM stress test</h2>
<button onclick="domTest()">Crear 10k nodos</button>
<p id="domResult"></p>
</div>

<div class="box">
<h2>5️⃣ Límites numéricos</h2>
<button onclick="numberTest()">Test números grandes</button>
<p id="numberResult"></p>
</div>

<script>

// 1️⃣ Listar propiedades
function listGlobals() {
  let props = Object.getOwnPropertyNames(window);
  document.getElementById("globalCount").textContent = props.length;
  document.getElementById("globalList").textContent = props.join("\n");
}

// 2️⃣ Test JIT (indirecto por rendimiento)
function jitTest() {
  let start = performance.now();
  function heavy(n) {
    let x = 0;
    for (let i = 0; i < n; i++) {
      x += i % 10;
    }
    return x;
  }
  heavy(50_000_000);
  let end = performance.now();
  let time = end - start;
  document.getElementById("jitResult").textContent =
    "Tiempo ejecución: " + time.toFixed(2) + " ms";
}

// 3️⃣ Array grande
function arrayTest() {
  try {
    let arr = new Array(10_000_000).fill(1);
    document.getElementById("arrayResult").textContent =
      "Array creado correctamente (10M elementos)";
  } catch (e) {
    document.getElementById("arrayResult").textContent =
      "Error creando array: " + e.message;
  }
}

// 4️⃣ DOM stress
function domTest() {
  try {
    let container = document.createElement("div");
    for (let i = 0; i < 10000; i++) {
      let el = document.createElement("span");
      el.textContent = "x";
      container.appendChild(el);
    }
    document.body.appendChild(container);
    document.getElementById("domResult").textContent =
      "10,000 nodos creados correctamente";
  } catch (e) {
    document.getElementById("domResult").textContent =
      "Error DOM: " + e.message;
  }
}

// 5️⃣ Límites numéricos
function numberTest() {
  try {
    let big = Number.MAX_SAFE_INTEGER;
    let overflow = big + 1;
    document.getElementById("numberResult").textContent =
      "MAX_SAFE_INTEGER: " + big +
      " | big+1 === big? " + (overflow === big);
  } catch (e) {
    document.getElementById("numberResult").textContent =
      "Error numérico: " + e.message;
  }
}

</script>

</body>
</html>
